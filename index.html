<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>هديتي لك ❤️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Tahoma', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; }
    .heart { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="max-w-md mx-auto text-center p-8">
    
    <!-- شاشة كلمة السر -->
    <div id="lockScreen" class="space-y-6">
      <h1 class="text-4xl font-bold heart">❤️ لـ [اسم حبيبتك/حبيبك] ❤️</h1>
      <p class="text-xl">في عيونك لقيت الدنيا كلها..</p>
      <input id="password" type="password" placeholder="كلمة السر بيننا فقط 🔒" 
             class="w-full px-6 py-4 rounded-2xl bg-white/10 text-center text-xl focus:outline-none">
      <button onclick="checkPassword()" 
              class="w-full bg-pink-500 hover:bg-pink-600 py-4 rounded-2xl text-xl font-bold">
        افتح الهدية ✨
      </button>
      <p class="text-sm opacity-70">جرب كلمة السر اللي قلتلك إياها 😉</p>
    </div>

    <!-- المحتوى بعد فتح السر -->
    <div id="content" class="hidden space-y-8">
      <h1 class="text-5xl font-bold heart">أحبك [اسمك] ❤️</h1>
      
      <!-- صورة 1 -->
      <img src="https://رابط-صورتك-الأولى.jpg" class="rounded-3xl shadow-2xl mx-auto" alt="صورة 1">
      
      <!-- أغنية -->
      <div>
        <p class="text-lg mb-3">أغنيتنا الخاصة 🎵</p>
        <iframe width="100%" height="100" 
                src="https://www.youtube.com/embed/رابط_اليوتيوب_هنا?autoplay=1" 
                frameborder="0" allowfullscreen class="rounded-2xl"></iframe>
      </div>

      <!-- صورة 2 + رسالة -->
      <img src="https://رابط-صورتك-الثانية.jpg" class="rounded-3xl shadow-2xl mx-auto" alt="صورة 2">
      <div class="bg-white/10 p-8 rounded-3xl text-lg leading-relaxed">
        هون رسالتي الخاصة لك..<br>
        [اكتب رسالتك الحلوة هنا يا وحش 🔥]
      </div>

      <p class="text-pink-300 text-sm">هذي الهدية للأبد.. ما بتنتهي أبداً 💫</p>
    </div>
  </div>

  <script>
    function checkPassword() {
      const pass = document.getElementById("password").value;
      const realPass = "كلمة_السر_هنا"; // غيّرها للي بدك

      if (pass === realPass) {
        document.getElementById("lockScreen").classList.add("hidden");
        document.getElementById("content").classList.remove("hidden");
      } else {
        alert("خطأ يا قلبي.. جرب تاني 😉");
      }
    }
  </script>
</body>
</html>
